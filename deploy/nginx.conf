# nginx is the public face on :80. It serves the built React SPA and reverse-proxies the API
# (and health endpoints) to the co-located .NET app on 127.0.0.1:8080.

server {
    listen 80 default_server;
    server_name _;

    # Uploads: avatars are capped at 3 MB by the API; allow headroom for .ics imports too.
    client_max_body_size 12m;

    root /usr/share/nginx/html;
    index index.html;

    # --- API + health/readiness -> the .NET app ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
    location = /ready {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # --- SPA: hashed assets get long cache; everything else falls back to the app shell ---
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
