# CalendarIT — reference compose stack.
#
# Runs the app (API + bundled SPA) against PostgreSQL. The app serves plain HTTP on
# port 8080; put your own reverse proxy (Caddy / Traefik / nginx / ...) in front of it
# to terminate TLS. Copy .env.example to .env and set at least JWT_SIGNING_KEY.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calendarit}
      POSTGRES_USER: ${POSTGRES_USER:-calendarit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calendarit} -d ${POSTGRES_DB:-calendarit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_PROVIDER: Postgres
      POSTGRES_CONNECTION: "Host=db;Port=5432;Database=${POSTGRES_DB:-calendarit};Username=${POSTGRES_USER:-calendarit};Password=${POSTGRES_PASSWORD:-changeme}"
      APPDATA_PATH: /appdata
      APPLY_MIGRATIONS: "true"
      LOG_FORMAT: json
      LOG_LEVEL: Information
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:?set JWT_SIGNING_KEY in .env}
      JWT_ISSUER: ${JWT_ISSUER:-calendarit}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-calendarit}
    volumes:
      - appdata:/appdata
    ports:
      # Expose to the host / reverse proxy. Change the host port as needed.
      - "8080:8080"

volumes:
  pgdata:
  appdata:
