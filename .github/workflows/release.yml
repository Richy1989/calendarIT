name: Release

# A git tag `vX.Y.Z` is a release: build & push the Docker image (linux/amd64, same as
# deploy/build-and-push.ps1) and publish a GitHub Release. Pre-release tags like
# `v0.2.0-rc1` are allowed — they push the versioned image but do NOT move `:latest`,
# and the GitHub Release is marked as a pre-release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Derive the version from the tag: vX.Y.Z[-suffix] -> VERSION_NAME=X.Y.Z[-suffix].
      # Same acceptance rule as deploy/build-and-push.ps1 — anything else would be stamped
      # into MSBuild's $(Version) and break the publish.
      - name: Compute version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a vMAJOR.MINOR.PATCH[-suffix] version tag." >&2
            exit 1
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          if [[ "$VERSION_NAME" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      # ---- Docker image (SPA + API + nginx) to Docker Hub ----
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # flavor latest=auto: `:latest` moves only for clean semver tags, never for pre-releases —
      # mirrors the ":latest only moves on a release" policy in deploy/build-and-push.ps1.
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: richy1989/calendarit
          tags: |
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Baked into the API's assembly version (deploy/Dockerfile ARGs).
          build-args: |
            VERSION=${{ env.VERSION_NAME }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- GitHub Release ----
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ env.PRERELEASE == 'true' }}
          body: |
            **Docker:** `docker pull richy1989/calendarit:${{ env.VERSION_NAME }}`

            Single-container image (SPA + API + nginx on :80). Mount `/data` to persist the
            SQLite db and uploads — see `deploy/calendarit.unraid.xml` for an Unraid template.
